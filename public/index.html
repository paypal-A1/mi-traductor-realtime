<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola Traductora</title>
    <style>
        body { font-family: Arial; text-align: center; background: #f4f7f6; padding: 20px; }
        .container { max-width: 350px; margin: auto; background: white; padding: 30px; border-radius: 20px; }
        input { width: 100%; height: 50px; font-size: 24px; text-align: center; margin-bottom: 20px; }
        button { padding: 18px; font-size: 20px; margin: 5px; border-radius: 10px; cursor: pointer; }
        .call { background: #2ecc71; color: white; width: 100%; }
        .hangup { background: #e74c3c; color: white; width: 100%; display: none; }
        .sound { background: #3498db; color: white; width: 100%; margin-top: 10px; }
        .status { margin-top: 15px; font-size: 14px; color: #e67e22; }
    </style>
</head>
<body>
<div class="container">
    <h2>Traductor Global</h2>
    <input type="text" id="phoneNumber" placeholder="+1234567890" />
    <div>
        <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button>
        <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button>
        <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button>
        <button onclick="press('+')">+</button><button onclick="press('0')">0</button><button onclick="backspace()">⌫</button>
    </div>
    <button id="callBtn" class="call" onclick="startCall()">📞 Llamar</button>
    <button id="hangupBtn" class="hangup" onclick="endCall()">🛑 Colgar</button>
    <button id="activarSonidoBtn" class="sound">🔊 Activar Sonido</button>
    <div id="statusMessage" class="status">Conectando...</div>
</div>

<script>
    let ws, audioCtx, processor, source, globalStream;
    let keepAliveInterval;

    function press(n) { document.getElementById('phoneNumber').value += n; }
    function backspace() { let v = document.getElementById('phoneNumber').value; document.getElementById('phoneNumber').value = v.slice(0, -1); }

    function connectWebSocket() {
        const protocol = location.protocol === 'https:' ? 'wss://' : 'ws://';
        ws = new WebSocket(protocol + location.host + '/browser-stream');
        
        ws.onopen = () => {
            document.getElementById('statusMessage').innerText = "✅ Conectado";
            if (keepAliveInterval) clearInterval(keepAliveInterval);
            keepAliveInterval = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' }));
            }, 25000);
        };
        
        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'audio' && data.payload) playUlawBase64(data.payload);
            } catch(e) {
                // Si no es JSON, es audio base64 directo
                playUlawBase64(event.data);
            }
        };
        
        ws.onclose = () => {
            if (keepAliveInterval) clearInterval(keepAliveInterval);
            document.getElementById('statusMessage').innerText = "⚠️ Reconectando...";
            setTimeout(connectWebSocket, 3000);
        };
    }

    async function startMicrophone() {
        try {
            globalStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            source = audioCtx.createMediaStreamSource(globalStream);
            processor = audioCtx.createScriptProcessor(2048, 1, 1);
            source.connect(processor);
            processor.connect(audioCtx.destination);
            processor.onaudioprocess = (e) => {
                const input = e.inputBuffer.getChannelData(0);
                const ulaw = new Uint8Array(input.length);
                for (let i = 0; i < input.length; i++) {
                    let s = Math.min(1, Math.max(-1, input[i])) * 32767;
                    ulaw[i] = linear2ulaw(s);
                }
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(btoa(String.fromCharCode.apply(null, ulaw)));
                }
            };
        } catch(err) { alert("Microfono no disponible"); }
    }

    function stopMicrophone() {
        if (globalStream) globalStream.getTracks().forEach(t => t.stop());
        if (processor) processor.disconnect();
        if (source) source.disconnect();
    }

    function linear2ulaw(s) {
        let sign = (s >> 8) & 0x80;
        if (s < 0) { s = -s; sign = 0x80; }
        if (s > 32635) s = 32635;
        s += 0x84;
        let exp = 7;
        for (let bit = 0x4000; (s & bit) === 0 && exp > 0; bit >>= 1) exp--;
        let mant = (s >> (exp + 3)) & 0x0F;
        return ~(sign | (exp << 4) | mant) & 0xFF;
    }

    function ulaw2linear(ulaw) {
        ulaw = ~ulaw & 0xFF;
        let sign = ulaw & 0x80;
        let exp = (ulaw >> 4) & 0x07;
        let mant = ulaw & 0x0F;
        let s = ((mant << 3) + 132) << exp;
        s -= 132;
        return sign ? -s : s;
    }

    function playUlawBase64(b64) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const bin = atob(b64);
        const floats = new Float32Array(bin.length);
        for (let i = 0; i < bin.length; i++) floats[i] = ulaw2linear(bin.charCodeAt(i)) / 32768;
        const buf = audioCtx.createBuffer(1, bin.length, 8000);
        buf.getChannelData(0).set(floats);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(audioCtx.destination);
        src.start();
    }

    async function startCall() {
        const number = document.getElementById('phoneNumber').value;
        if (!number) return alert("Número requerido");
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        await audioCtx.resume();
        document.getElementById('callBtn').style.display = 'none';
        document.getElementById('hangupBtn').style.display = 'block';
        await startMicrophone();
        const res = await fetch('/make-call', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ toPhoneNumber: number }) });
        const data = await res.json();
        if (!data.success) alert("Error: " + data.error);
        else document.getElementById('statusMessage').innerText = "Llamada activa";
    }

    async function endCall() {
        await fetch('/hangup', { method: 'POST' });
        stopMicrophone();
        document.getElementById('callBtn').style.display = 'block';
        document.getElementById('hangupBtn').style.display = 'none';
        document.getElementById('statusMessage').innerText = "Llamada finalizada";
    }

    document.getElementById('activarSonidoBtn').onclick = async () => {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        await audioCtx.resume();
        
        // Crear y reproducir un silencio para "desbloquear" el audio
        const silence = audioCtx.createBuffer(1, 1, 22050);
        const source = audioCtx.createBufferSource();
        source.buffer = silence;
        source.connect(audioCtx.destination);
        source.start();
        
        document.getElementById('statusMessage').innerText = "✅ Sonido activado";
        document.getElementById('statusMessage').style.color = '#2ecc71';
    };
    window.onload = () => { connectWebSocket(); };
</script>
</body>
</html>
