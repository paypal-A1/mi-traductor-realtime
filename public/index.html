<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor en Tiempo Real GA</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: #202024;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #04d361;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .control-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
            justify-content: space-between;
        }

        select {
            flex: 1;
            padding: 12px;
            background: #121214;
            border: 2px solid #29292e;
            color: #fff;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }

        select:focus {
            border-color: #04d361;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-start {
            background-color: #04d361;
            color: #000;
        }

        .btn-start:hover {
            background-color: #02b852;
        }

        .btn-stop {
            background-color: #e23e44;
            color: #fff;
        }

        .btn-stop:hover {
            background-color: #cc3237;
        }

        button:disabled {
            background-color: #4d4d56;
            color: #8d8d99;
            cursor: not-allowed;
        }

        .status-panel {
            text-align: center;
            font-size: 14px;
            color: #8d8d99;
            margin-bottom: 20px;
            padding: 8px;
            border-radius: 4px;
            background: #121214;
        }

        .transcript-box {
            margin-bottom: 20px;
        }

        .transcript-label {
            font-size: 14px;
            color: #04d361;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .box {
            width: 100%;
            height: 120px;
            background: #121214;
            border: 1px solid #29292e;
            border-radius: 6px;
            padding: 12px;
            box-sizing: border-box;
            overflow-y: auto;
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .source-box {
            border-left: 4px solid #a8a8b3;
        }

        .target-box {
            border-left: 4px solid #04d361;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Traductor en Tiempo Real</h1>

    <div class="control-group">
        <select id="languageSelect">
            <option value="es">Traducir a: Español (es)</option>
            <option value="en">Traducir a: Inglés (en)</option>
            <option value="fr">Traducir a: Francés (fr)</option>
            <option value="de">Traducir a: Alemán (de)</option>
            <option value="it">Traducir a: Italiano (it)</option>
            <option value="pt">Traducir a: Portugués (pt)</option>
        </select>
        
        <button id="startBtn" class="btn-start">Iniciar</button>
        <button id="stopBtn" class="btn-stop" disabled>Detener</button>
    </div>

    <div id="statusLabel" class="status-panel">Estado: Desconectado</div>

    <div class="transcript-box">
        <div class="transcript-label">Lo que dices (Origen):</div>
        <div id="sourceTranscript" class="box source-box"></div>
    </div>

    <div class="transcript-box">
        <div class="transcript-label">Traducción (Destino):</div>
        <div id="targetTranscript" class="box target-box"></div>
    </div>
</div>

<script>
    let ws = null;
    let audioContext = null;
    let scriptProcessor = null;
    let mediaStream = null;
    
    // Configuración para la reproducción de audio secuencial (PCM 24kHz)
    let audioPlaybackContext = null;
    let nextPlaybackTime = 0;
    const SAMPLE_RATE_OUT = 24000;

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusLabel = document.getElementById('statusLabel');
    const sourceTranscript = document.getElementById('sourceTranscript');
    const targetTranscript = document.getElementById('targetTranscript');
    const languageSelect = document.getElementById('languageSelect');

    startBtn.addEventListener('click', iniciarTraduccion);
    stopBtn.addEventListener('click', detenerTraduccion);

    function actualizarEstado(texto, color = '#8d8d99') {
        statusLabel.innerText = `Estado: ${texto}`;
        statusLabel.style.color = color;
    }

    function iniciarTraduccion() {
        startBtn.disabled = true;
        languageSelect.disabled = true;
        sourceTranscript.innerText = "";
        targetTranscript.innerText = "";
        actualizarEstado("Conectando con el servidor local...", "#ffcd1e");

        // Determinar protocolo WebSocket según la URL actual
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const host = window.location.host;
        ws = new WebSocket(`${protocol}${host}/client-stream`);

        ws.onopen = () => {
            actualizarEstado("Conectado. Inicializando micrófono...", "#04d361");
            
            // Indicar al servidor que inicie la sesión de traducción con el idioma seleccionado
            ws.send(JSON.stringify({
                type: "start_session",
                language: languageSelect.value
            }));

            inicializarCapturaAudio();
        };

        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);

                // 1. Recibir transcripción original (Origen)
                if (msg.type === "transcript_source") {
                    sourceTranscript.innerText += msg.delta;
                    sourceTranscript.scrollTop = sourceTranscript.scrollHeight;
                }

                // 2. Recibir transcripción traducida (Destino)
                if (msg.type === "transcript_target") {
                    targetTranscript.innerText += msg.delta;
                    targetTranscript.scrollTop = targetTranscript.scrollHeight;
                }

                // 3. Recibir fragmento de audio traducido
                if (msg.type === "audio_delta" && msg.delta) {
                    reproducirFragmentoPCM(msg.delta);
                }

            } catch (err) {
                console.error("Error leyendo datos del WebSocket:", err);
            }
        };

        ws.onerror = (error) => {
            console.error("Error en WebSocket:", error);
            actualizarEstado("Error de conexión", "#e23e44");
        };

        ws.onclose = () => {
            actualizarEstado("Desconectado", "#8d8d99");
            limpiarRecursosAudio();
        };
    }

    function inicializarCapturaAudio() {
        navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then((stream) => {
                mediaStream = stream;
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                audioPlaybackContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE_OUT });
                nextPlaybackTime = audioPlaybackContext.currentTime;

                const source = audioContext.createMediaStreamSource(stream);
                const bufferSize = 4096;
                
                // Creamos el procesador de script para capturar el flujo nativo
                scriptProcessor = audioContext.createScriptProcessor(bufferSize, 1, 1);
                source.connect(scriptProcessor);
                scriptProcessor.connect(audioContext.destination);

                const inputSampleRate = audioContext.sampleRate;

                scriptProcessor.onaudioprocess = (audioProcessingEvent) => {
                    if (!ws || ws.readyState !== WebSocket.OPEN) return;

                    const inputBuffer = audioProcessingEvent.inputBuffer;
                    const inputData = inputBuffer.getChannelData(0); // Canal Monofónico

                    // Downsampling nativo en navegador de Entrada (X kHz) -> Salida (24kHz PCM16)
                    const pcm16Base64 = downsampleToPcm16Base64(inputData, inputSampleRate, 24000);
                    
                    if (pcm16Base64) {
                        ws.send(JSON.stringify({
                            type: "audio_append",
                            audio: pcm16Base64
                        }));
                    }
                };

                stopBtn.disabled = false;
                actualizarEstado("Transmitiendo y Traduciendo en vivo...", "#04d361");
            })
            .catch((err) => {
                console.error("Error accediendo al micrófono:", err);
                actualizarEstado("Permiso de micrófono denegado", "#e23e44");
                detenerTraduccion();
            });
    }

    // Algoritmo crudo de Downsampling y conversión a Int16 lineal
    function downsampleToPcm16Base64(buffer, fromSampleRate, toSampleRate) {
        const sampleRateRatio = fromSampleRate / toSampleRate;
        const newLength = Math.round(buffer.length / sampleRateRatio);
        const result = new Int16Array(newLength);
        
        let offsetResult = 0;
        let offsetBuffer = 0;
        
        while (offsetResult < result.length) {
            let nextOffsetBuffer = Math.round((offsetResult + 1) * sampleRateRatio);
            let accum = 0, count = 0;
            for (let i = offsetBuffer; i < nextOffsetBuffer && i < buffer.length; i++) {
                accum += buffer[i];
                count++;
            }
            let sample = count > 0 ? accum / count : 0;
            // Clamping y conversión a 16 bits lineales
            result[offsetResult] = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
            offsetResult++;
            offsetBuffer = nextOffsetBuffer;
        }

        // Conversión limpia del búfer binario a cadena Base64
        const binaryString = String.fromCharCode.apply(null, new Uint8Array(result.buffer));
        return btoa(binaryString);
    }

    // Reproductor secuencial de fragmentos PCM de 24kHz devueltos por OpenAI
    function reproducirFragmentoPCM(base64Data) {
        if (!audioPlaybackContext) return;

        const binaryString = atob(base64Data);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }

        // Reconstrucción del Int16Array crudo desde los bytes recibidos
        const int16Samples = new Int16Array(bytes.buffer);
        const float32Samples = new Float32Array(int16Samples.length);

        // Normalización de Int16 a Float32 para el AudioContext del navegador
        for (let i = 0; i < int16Samples.length; i++) {
            float32Samples[i] = int16Samples[i] / (int16Samples[i] < 0 ? 32768 : 32767);
        }

        const audioBuffer = audioPlaybackContext.createBuffer(1, float32Samples.length, SAMPLE_RATE_OUT);
        audioBuffer.getChannelData(0).set(float32Samples);

        const source = audioPlaybackContext.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(audioPlaybackContext.destination);

        // Encadenamiento temporal milimétrico para evitar clics de audio desfasados
        const currentTime = audioPlaybackContext.currentTime;
        if (nextPlaybackTime < currentTime) {
            nextPlaybackTime = currentTime;
        }
        source.start(nextPlaybackTime);
        nextPlaybackTime += audioBuffer.duration;
    }

    function detenerTraduccion() {
        stopBtn.disabled = true;
        actualizarEstado("Cerrando sesión de forma segura...", "#ffcd1e");

        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: "stop_session" }));
            // Damos un pequeño margen para que el buffer de OpenAI se limpie antes de tumbar el socket
            setTimeout(() => {
                ws.close();
            }, 500);
        } else {
            limpiarRecursosAudio();
            actualizarEstado("Desconectado", "#8d8d99");
        }
    }

    function limpiarRecursosAudio() {
        startBtn.disabled = false;
        languageSelect.disabled = false;
        
        if (scriptProcessor) {
            scriptProcessor.disconnect();
            scriptProcessor = null;
        }
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
            mediaStream = null;
        }
        if (audioContext) {
            audioContext.close();
            audioContext = null;
        }
        if (audioPlaybackContext) {
            audioPlaybackContext.close();
            audioPlaybackContext = null;
        }
    }
</script>

</body>
</html>
